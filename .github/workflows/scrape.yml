name: Hourly gold price scrape

on:
  schedule:
    # Runs at minute 0 of every hour (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the updated data file

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "gold-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/prices.json
          git diff --staged --quiet || git commit -m "Add hourly price reading"
          git push
